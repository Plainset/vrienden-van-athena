<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="print.title">Print QR — Vrienden van AthenA</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/favicon/favicon-32.png">
<link rel="stylesheet" href="css/print.css">
</head>
<body>
  <main class="print-sheet">
    <img class="print-logo" src="assets/img/athena-logo.png" alt="" width="72" height="72">
    <p class="print-eyebrow">Vrienden van AthenA</p>
    <img class="print-qr" src="assets/downloads/vriendenvanathena-qr.svg" alt="QR-code naar vriendenvanathena.nl" width="320" height="320">
    <p class="print-url">vriendenvanathena.nl</p>
    <p class="print-hint" data-i18n="print.hint">Scan de code met je telefooncamera om de Vrienden-pagina van Hockeyclub AthenA te openen.</p>

    <button class="print-btn no-print" onclick="window.print()" data-i18n="print.button">Print dit vel</button>
    <a class="print-back no-print" href="index.html" data-i18n-html="print.back">&larr; Terug naar de website</a>
  </main>
  <script src="js/i18n.js" defer></script>
</body>
</html>
